apiVersion: apps/v1
kind: Deployment
metadata:
  name: draw-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: draw-app
  template:
    metadata:
      labels:
        app: draw-app
    spec:
      containers:
        - name: draw-app
          image: 8sem/draw-app:latest # Replace with your Docker Hub image
          ports:
            - containerPort: 5173

---
apiVersion: v1
kind: Service
metadata:
  name: draw-app-service
spec:
  type: NodePort
  selector:
    app: draw-app
  ports:
    - protocol: TCP
      port: 5173
      targetPort: 5173
